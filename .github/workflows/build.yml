name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - "main"
    tags:
      - v*
  schedule:
    - cron: "0 0 * * 1"
  pull_request:

jobs:
  build-x86_64-unknown-linux-gnu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: config
        run: |
          git clone https://github.com/mozilla/gecko-dev.git --depth=1
          mkdir -p $HOME/mozconfigs
          cp ./optimized $HOME/mozconfigs/optimized
          export MOZCONFIG=$HOME/mozconfigs/optimized

      - name: Build
        run: |
          export MOZCONFIG=$HOME/mozconfigs/optimized

          cd gecko-dev
          ./mach build
          sudo apt install tree -y
          tree ./ > tree.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: spidermonkey-x86_64-unknown-linux-gnu
          path: ./gecko-dev/.mozbuild,./gecko-dev/tree.txt
  build:
    needs:
      [
        "build-x86_64-unknown-linux-gnu",
        # "build-windows",
        # "build-macos-x86_64",
        # "build-macos-aarch64",
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: spidermonkey
          pattern: spidermonkey-*
          merge-multiple: true

      - name: release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "spidermonkey/*.tar.gz"
